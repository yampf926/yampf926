<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yampf926</title>
    <script>
      const path = window.location.pathname;
      const dohwaPrefix = '/yampf926/dohwa/';
      if (path.startsWith(dohwaPrefix)) {
        const route = path.slice(dohwaPrefix.length).replace(/^\/+/, '');
        window.location.replace('/yampf926/dohwa/#/' + route + window.location.search + window.location.hash);
      } else {
        window.location.replace('/yampf926/');
      }
    </script>
  </head>
  <body></body>
</html>
